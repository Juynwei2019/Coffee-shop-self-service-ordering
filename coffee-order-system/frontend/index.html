<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無印風咖啡點餐系統</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="nav-tabs" id="category-tabs">
            <button class="nav-item active" data-category="全部">全部</button>
            <button class="nav-item" data-category="咖啡">咖啡</button>
            <button class="nav-item" data-category="茶飲">茶飲</button>
            <button class="nav-item" data-category="點心">點心</button>
        </nav>
    </header>

    <main class="product-list" id="product-list"></main>

    <template id="product-template">
        <div class="product-card">
            <div class="product-info">
                <h3 class="product-name"></h3>
                <p class="product-price"></p>
            </div>
            <button class="add-btn">＋</button>
        </div>
    </template>

    <div class="cart-drawer" id="cart-drawer">
        <div id="cart-items-container"></div>
    </div>

    <div class="bottom-bar" id="bottom-bar">
        <div class="cart-summary">
            <span class="cart-total-price">NT$ 0</span>
            <span class="cart-total-count">0 杯</span>
        </div>
        <button class="checkout-btn" id="checkout-btn">確認結帳</button>
    </div>

    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="bottom-sheet" id="custom-modal">
        <div class="sheet-header">
            <h3 id="modal-product-name">商品名稱</h3>
            <button class="close-btn" id="close-modal-btn">✕</button>
        </div>
        
        <div class="option-group" id="ice-group">
            <h4>冰塊</h4>
            <div class="option-grid" id="ice-options">
                <button class="option-btn" data-val="熱">熱</button>
                <button class="option-btn selected" data-val="正常冰">正常冰</button>
                <button class="option-btn" data-val="少冰">少冰</button>
                <button class="option-btn" data-val="去冰">去冰</button>
            </div>
        </div>

        <div class="option-group" id="sugar-group">
            <h4>甜度</h4>
            <div class="option-grid" id="sugar-options">
                <button class="option-btn selected" data-val="正常糖">正常糖</button>
                <button class="option-btn" data-val="少糖">少糖</button>
                <button class="option-btn" data-val="半糖">半糖</button>
                <button class="option-btn" data-val="無糖">無糖</button>
            </div>
        </div>

        <button class="sheet-confirm-btn" id="add-to-cart-confirm-btn">加入購物車</button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
